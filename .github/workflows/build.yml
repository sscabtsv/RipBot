name: Build Geode Mod

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build git curl unzip python3

      - name: Install Geode CLI (safe)
        run: |
          curl -L https://github.com/geode-sdk/cli/releases/latest/download/geode-cli-linux.zip -o geode.zip
          unzip -o geode.zip

          chmod +x geode
          sudo mv geode /usr/local/bin/geode

          geode --version

      - name: Initialize Geode config (fix crash)
        run: |
          mkdir -p $HOME/.geode

          yes "" | geode config setup || true

      - name: Install Geode SDK
        run: |
          geode sdk install || true

      - name: Verify SDK exists
        run: |
          ls -la $HOME/.geode || true

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build

          cmake .. -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DGeode_DIR=$HOME/.geode/sdk || cmake .. -G Ninja

      - name: Build mod
        run: |
          cd build
          ninja

      - name: Package mod
        run: |
          cd build
          geode package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RipBot-geode
          path: build/*.geode
