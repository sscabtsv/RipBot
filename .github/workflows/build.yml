name: Build Geode Mod

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build mod
        uses: geode-sdk/build-geode-mod@main
        with:
          combine: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RipBot-geode
          path: build/*.geode
